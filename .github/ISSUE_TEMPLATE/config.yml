    url: https://github.com/InferHaven/inferhaven-core/discussions/categories/q-a
    about: "Ask in Discussions. Setup and usage questions are answered faster there than in the issue tracker."
  - name: 💬 InferHaven Discord
    url: https://discord.gg/X5htGNnEh5
    about: "Chat with the community and maintainers — best for quick setup help and real-time discussion."
  - name: 🔒 Report a security vulnerability
    url: https://github.com/InferHaven/inferhaven-core/blob/main/SECURITY.md
    about: "Do NOT open a public issue. Email lookout@inferhaven.com (PGP available). See the Security Policy for coordinated disclosure."
