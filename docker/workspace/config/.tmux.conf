# InferHaven — tmux configuration
# Optimized for AI-assisted coding workflows.

# ── Prefix key: Ctrl+a (more ergonomic than Ctrl+b) ────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Quality of life ─────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g display-time 1400
set -g message-style "bg=colour235,fg=colour46,bold"
set -g message-command-style "bg=colour235,fg=colour46"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g default-shell /bin/zsh
set -g exit-empty off

# Pass HAVEN_BADGE into the session on every re-attach.
set -ga update-environment " HAVEN_BADGE"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g extended-keys on

# ── Terminal app title ───────────────────────────────────────────────────────
# Propagates a meaningful title to the terminal emulator's tab/window so it
# shows "InferHaven | session: window" instead of a blank or generic "tmux".
set -g set-titles on
set -g set-titles-string "InferHaven | #S: #W"

# ── Split panes with | and - ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigate panes with Alt+arrow ──────────────────────────────────────────
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── Vim-style pane navigation ──────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ───────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded."

# ── Status bar click handlers ──────────────────────────────────────────────
# Left side (InferHaven label + loaded model) → model detail popup
bind -n MouseDown1StatusLeft \
  display-popup -E -w 65% -h 75% -T ' ⚡ Loaded Models' \
    '/usr/local/bin/inferhaven-model-info'
# Right side (downloads + sys stats) → smart popup:
#   downloads active → live progress view
#   otherwise        → btop + GPU monitor
bind -n MouseDown1StatusRight \
  run-shell '/usr/local/bin/inferhaven-right-popup'

# ── New windows in current path ────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Status bar ─────────────────────────────────────────────────────────────
# status-left : InferHaven label, session name, loaded model (inferhaven-loaded)
# status-right: active downloads, RAM/CPU/GPU, time (inferhaven-status)
#
# To customise: edit this section freely — InferHaven never overwrites .tmux.conf
# after it lands in your home volume. To replace the right side entirely, swap out
# the #(...) call with your own command or static string.
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour45,bold] InferHaven #[fg=colour238]│#[fg=colour83,bold] #S #[fg=colour238]│#[default] #(/usr/local/bin/inferhaven-loaded 2>/dev/null)"
set -g status-right "#(/usr/local/bin/inferhaven-status 2>/dev/null)"
set -g status-left-length 65
set -g status-right-length 120

# ── Window status ──────────────────────────────────────────────────────────
setw -g window-status-format "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour45,bold] #I:#W#[default] "

# ── Pane borders ───────────────────────────────────────────────────────────
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=cyan"

# ── Session persistence (tmux-resurrect + tmux-continuum) ──────────────────
# tmux-resurrect: saves/restores all sessions, windows, panes, and layouts.
#   prefix + Ctrl-s  — save now
#   prefix + Ctrl-r  — restore now
#
# tmux-continuum: auto-saves every 1 min, auto-restores on tmux start.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Override prefix+Ctrl-s to show a compact save badge instead of the plugin's
# full-width "Tmux environment saved!" message.
bind C-s run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message "󰆓 saved"

# Restore neovim sessions via the Session.vim file (requires vim-obsession)
set -g @resurrect-strategy-nvim 'session'
# Pane content injection and process restart are handled by ih-pane-restore
# (runs 3s post-boot with proper shell-ready timing). Resurrect's own mechanisms
# are disabled to avoid the race condition where send-keys are swallowed during zsh startup.
# Auto-save interval in minutes
set -g @continuum-save-interval '1'
# Automatically restore sessions when tmux starts
set -g @continuum-restore 'on'

# ── Save on client detach ───────────────────────────────────────────────────
# Triggers BOTH the resurrect layout save AND the ih-pane-capture content save
# whenever you detach or close your SSH client. Two saves so a manual `haven
# tmux save` is never required before a restart and the next boot has both
# structure (resurrect) and visible scrollback (ih_state) to restore.
set-hook -g client-detached "run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh ; /usr/local/bin/ih-pane-capture'"

# ── Initialize TPM (keep this line at the very bottom of tmux.conf) ─────────
run '~/.tmux/plugins/tpm/tpm'
