<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 — Access Denied</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e1e8ed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 460px; width: 100%; padding: 32px 24px; text-align: center; }
  .code { font-size: 80px; font-weight: 700; color: #e0245e; line-height: 1; letter-spacing: -3px; margin-bottom: 8px; }
  .title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 24px; }
  .card { background: #1a2332; border: 1px solid #2a3a4a; border-radius: 12px; padding: 20px 24px; text-align: left; }
  .card p { font-size: 14px; color: #8899a6; line-height: 1.7; }
  .card p + p { margin-top: 10px; }
  code { background: #0f1419; border: 1px solid #2a3a4a; padding: 1px 6px; border-radius: 4px; font-size: 12px; color: #c8d6e0; font-family: ui-monospace, 'Courier New', monospace; }
  .footer { margin-top: 28px; font-size: 12px; color: #657786; }
  .footer a { color: #2e86c1; text-decoration: none; }
  .footer a:hover { color: #3498d8; }
</style>
</head>
<body>
<div class="container">
  <div class="code">403</div>
  <div class="title">Access Denied</div>
  <div class="card">
    <p>Your IP address is not in the allowed list for this InferHaven server.</p>
    <p>To allow your IP or subnet, set <code>ALLOWED_IPS</code> in <code>.env</code> and run <code>docker compose up -d caddy</code> to apply the change.</p>
  </div>
  <div class="footer">
    <a href="https://inferhaven.com">InferHaven</a>
  </div>
</div>
</body>
</html>
