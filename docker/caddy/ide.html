<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InferHaven — Loading IDE</title>
<script>
  // Unregister VS Code service workers scoped to "/" — they cache blank
  // bare-domain responses and intercept /?folder=/ before Caddy sees them.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].scope.indexOf('/ide/') === -1) regs[i].unregister();
      }
    });
  }
  // If there is already a ?folder= param (e.g. came from a bare-domain redirect
  // like /?folder=/config/workspace), preserve it. Otherwise land on the configured
  // workspace. __WORKSPACE__ is substituted from DEFAULT_WORKSPACE by Caddy's
  // entrypoint at container start; if you see the literal placeholder here, the
  // render step did not run.
  var search = window.location.search;
  window.location.replace(search ? '/ide' + search : '/ide/?folder=__WORKSPACE__');
</script>
<meta http-equiv="refresh" content="1;url=/ide/?folder=__WORKSPACE__">
<style>
  body { background: #0f1419; color: #8899a6;
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         display: flex; align-items: center; justify-content: center;
         height: 100vh; margin: 0; font-size: 14px; }
</style>
</head>
<body>Loading IDE…</body>
</html>
